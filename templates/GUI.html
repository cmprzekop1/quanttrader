<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar {
            height: 100%;
            width: 200px;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            padding-top: 20px;
        }

        .sidebar a {
            padding: 10px 15px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
        }

        .sidebar a:hover {
            color: #f1f1f1;
        }

        .main {
            margin-left: 210px;
            padding: 20px;
        }

        .chart-container {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 class="w3-center w3-padding-16 w3-text-white">Admin Dashboard</h2>
    <a href="#home" onclick="showTab('home')">Home</a>
    <a href="#sales" onclick="showTab('sales')">Sales</a>
    <a href="#inventory" onclick="showTab('inventory')">Inventory</a>
    <a href="#customers" onclick="showTab('customers')">Customers</a>
    <a href="#logout" onclick="logout()">Logout</a>
</div>

<div class="main">
    <div id="home" class="tab-content">
        <h2>Home</h2>
        <p>Welcome to the Admin Dashboard.</p>
    </div>

    <div id="sales" class="tab-content" style="display:none;">
        <h2>Sales</h2>
        <div class="chart-container">
            <canvas id="salesChart"></canvas>
        </div>
    </div>

    <div id="inventory" class="tab-content" style="display:none;">
        <h2>Inventory</h2>
        <div class="chart-container">
            <canvas id="inventoryChart"></canvas>
        </div>
    </div>

    <div id="customers" class="tab-content" style="display:none;">
        <h2>Customers</h2>
        <div class="chart-container">
            <canvas id="customersChart"></canvas>
        </div>
    </div>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.style.display = 'none';
        });
        document.getElementById(tabId).style.display = 'block';
    }

    function logout() {
        window.location.href = '/C:/Users/16096/Desktop/Projects/stockbacktester/templates/index.html';
    }

    window.onload = function() {
        const salesCtx = document.getElementById('salesChart').getContext('2d');
        const inventoryCtx = document.getElementById('inventoryChart').getContext('2d');
        const customersCtx = document.getElementById('customersChart').getContext('2d');

        const salesChart = new Chart(salesCtx, {
            type: 'line',
            data: {
                labels: ['January', 'February', 'March', 'April', 'May', 'June', 'July'],
                datasets: [{
                    label: 'Sales',
                    data: [65, 59, 80, 81, 56, 55, 40],
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1,
                    fill: false
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        const inventoryChart = new Chart(inventoryCtx, {
            type: 'bar',
            data: {
                labels: ['Product 1', 'Product 2', 'Product 3', 'Product 4'],
                datasets: [{
                    label: 'Inventory',
                    data: [200, 150, 80, 120],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)',
                        'rgba(75, 192, 192, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        const customersChart = new Chart(customersCtx, {
            type: 'pie',
            data: {
                labels: ['New Customers', 'Returning Customers'],
                datasets: [{
                    label: 'Customers',
                    data: [300, 150],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
    };
</script>

</body>
</html>
